name: Docker Builder

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - development
    tags:
      - "*"

permissions:
  contents: write        # tag + release creation
  packages: write        # GHCR push (delegated)

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.tag.outputs.tag }}
      version_tag: ${{ steps.tag_version.outputs.new_tag }}
      update_dockerhub_description: ${{ steps.flags.outputs.is_main }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Docker tag
        id: tag
        # `github.ref_name` is the branch or tag name without the
        # `refs/heads/` or `refs/tags/` prefix -- safer than slicing
        # GITHUB_REF, which previously stripped 11 chars and dropped the
        # leading `v` from `refs/tags/v1.2.3`.
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            DOCKER_TAG="${{ github.ref_name }}"
          elif [[ "${{ github.ref_name }}" == "development" ]]; then
            DOCKER_TAG="dev"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            DOCKER_TAG="latest"
          else
            DOCKER_TAG="${{ github.ref_name }}"
          fi
          echo "tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set flags
        id: flags
        run: |
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and push tag
        if: github.ref == 'refs/heads/main'
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_release_rules: major:major,breaking:major,minor:minor,patch:patch,fix:patch

      - name: Create a GitHub release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

  build-and-publish:
    name: Build and publish
    needs: prepare
    uses: ./.github/workflows/_build-and-publish.yaml
    with:
      docker_tag: ${{ needs.prepare.outputs.docker_tag }}
      version_tag: ${{ needs.prepare.outputs.version_tag }}
      publish_to_dockerhub: true
      update_dockerhub_description: ${{ needs.prepare.outputs.update_dockerhub_description == 'true' }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
